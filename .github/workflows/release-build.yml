name: Android (CI / Release)

on:
  release:
    types: [published]
  workflow_dispatch:

run-name: ${{ github.event_name == 'workflow_dispatch' && 'Android Manual Tests' || format('Android Release Build {0}', github.event.release.tag_name) }}

permissions:
  contents: write

jobs:
  android:
    name: ${{ github.event_name == 'workflow_dispatch' && 'Android Manual Tests' || 'Android Release Build' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Repair Rollup native dependency
        run: |
          if ! node -e "require.resolve('@rollup/rollup-linux-x64-gnu')" >/dev/null 2>&1; then
            rollup_version="$(node -p "require('./node_modules/rollup/package.json').version")"
            npm install --no-save --package-lock=false "@rollup/rollup-linux-x64-gnu@$rollup_version"
          fi

      - name: Install native build tools
        if: github.event_name == 'release'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake make ninja-build perl

      - name: Install Android SDK packages
        if: github.event_name == 'release'
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018"

      - name: Prepare APK signing key
        if: github.event_name == 'release'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD_SECRET: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS_SECRET: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD_SECRET: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          keystore_file="$RUNNER_TEMP/androminer-release.jks"

          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            if [ -z "${ANDROID_KEYSTORE_PASSWORD_SECRET:-}" ] || [ -z "${ANDROID_KEY_ALIAS_SECRET:-}" ]; then
              echo "::error::ANDROID_KEYSTORE_PASSWORD and ANDROID_KEY_ALIAS secrets are required when ANDROID_KEYSTORE_BASE64 is set."
              exit 1
            fi

            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_file"
            store_password="$ANDROID_KEYSTORE_PASSWORD_SECRET"
            key_alias="$ANDROID_KEY_ALIAS_SECRET"
            key_password="${ANDROID_KEY_PASSWORD_SECRET:-$ANDROID_KEYSTORE_PASSWORD_SECRET}"
          else
            store_password="$(openssl rand -base64 32)"
            key_alias="androminer-release"
            key_password="$store_password"

            keytool -genkeypair \
              -v \
              -keystore "$keystore_file" \
              -storepass "$store_password" \
              -keypass "$key_password" \
              -alias "$key_alias" \
              -keyalg RSA \
              -keysize 4096 \
              -validity 10000 \
              -dname "CN=AndroMiner, OU=Release, O=AndroMiner, L=Unknown, ST=Unknown, C=US"

            echo "::warning::ANDROID_KEYSTORE_BASE64 is not configured. Generated a temporary signing key; users may need to uninstall older builds before installing future releases."
          fi

          {
            echo "ANDROID_KEYSTORE_FILE=$keystore_file"
            echo "ANDROID_KEYSTORE_PASSWORD=$store_password"
            echo "ANDROID_KEY_ALIAS=$key_alias"
            echo "ANDROID_KEY_PASSWORD=$key_password"
          } >> "$GITHUB_ENV"

      - name: Prepare Android release version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail

          version_name="${RELEASE_TAG#v}"

          {
            echo "ANDROID_VERSION_NAME=$version_name"
            echo "ANDROID_VERSION_CODE=$RELEASE_RUN_NUMBER"
          } >> "$GITHUB_ENV"

      - name: Check formatting
        if: github.event_name == 'workflow_dispatch'
        run: npm run format:check

      - name: Build web app
        if: github.event_name == 'workflow_dispatch'
        run: npm run build

      - name: Sync Android project
        if: github.event_name == 'workflow_dispatch'
        run: npx cap sync android

      - name: Run Android unit tests
        if: github.event_name == 'workflow_dispatch'
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest --stacktrace

      - name: Build web app and sync Android project
        if: github.event_name == 'release'
        run: npm run android:sync

      - name: Package Capacitor web update
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          mkdir -p release-assets
          test -f dist/index.html

          python3 - <<'PY'
          import os
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          tag = os.environ["RELEASE_TAG"]
          root = Path("dist")
          target = Path("release-assets") / f"androminer-web-{tag}.zip"

          with ZipFile(target, "w", ZIP_DEFLATED) as bundle:
              for path in sorted(root.rglob("*")):
                  if path.is_file():
                      bundle.write(path, path.relative_to(root).as_posix())
          PY

          test -f "release-assets/androminer-web-${RELEASE_TAG}.zip"

      - name: Build downloader APK
        if: github.event_name == 'release'
        run: |
          chmod +x android/gradlew
          mkdir -p release-assets
          (cd android && ./gradlew clean assembleRelease -PtargetSdkVersionOverride=28 -PversionNameOverride="$ANDROID_VERSION_NAME" -PversionCodeOverride="$ANDROID_VERSION_CODE" --stacktrace)
          apk="$(find android/app/build/outputs/apk/release -type f -name "*.apk" ! -name "*unsigned*.apk" | head -n 1)"
          test -n "$apk"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --print-certs "$apk"
          cp "$apk" "release-assets/androminer-download-${{ github.event.release.tag_name }}.apk"

      - name: Build TLS miner
        if: github.event_name == 'release'
        env:
          XMRIG_REF: v6.26.0
          LIBUV_REF: v1.48.0
          OPENSSL_REF: openssl-4.0.0
          WITH_TLS: ON
          QUIET: ON
        run: ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018" bash miner-builder/build-xmrig-android.sh

      - name: Build TLS bundled APK
        if: github.event_name == 'release'
        run: |
          (cd android && ./gradlew clean assembleRelease -PbundleMiner=true -PversionNameOverride="$ANDROID_VERSION_NAME" -PversionCodeOverride="$ANDROID_VERSION_CODE" --stacktrace)
          apk="$(find android/app/build/outputs/apk/release -type f -name "*.apk" ! -name "*unsigned*.apk" | head -n 1)"
          test -n "$apk"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --print-certs "$apk"
          cp "$apk" "release-assets/androminer-tls-${{ github.event.release.tag_name }}.apk"

      - name: Build no-TLS miner
        if: github.event_name == 'release'
        env:
          XMRIG_REF: v6.26.0
          LIBUV_REF: v1.48.0
          OPENSSL_REF: openssl-4.0.0
          WITH_TLS: OFF
          QUIET: ON
        run: ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018" bash miner-builder/build-xmrig-android.sh

      - name: Build no-TLS bundled APK
        if: github.event_name == 'release'
        run: |
          (cd android && ./gradlew clean assembleRelease -PbundleMiner=true -PversionNameOverride="$ANDROID_VERSION_NAME" -PversionCodeOverride="$ANDROID_VERSION_CODE" --stacktrace)
          apk="$(find android/app/build/outputs/apk/release -type f -name "*.apk" ! -name "*unsigned*.apk" | head -n 1)"
          test -n "$apk"
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --print-certs "$apk"
          cp "$apk" "release-assets/androminer-notls-${{ github.event.release.tag_name }}.apk"

      - name: Collect release outputs
        if: github.event_name == 'release'
        run: |
          ls -lh release-assets
          test -f "release-assets/androminer-download-${{ github.event.release.tag_name }}.apk"
          test -f "release-assets/androminer-tls-${{ github.event.release.tag_name }}.apk"
          test -f "release-assets/androminer-notls-${{ github.event.release.tag_name }}.apk"
          test -f "release-assets/androminer-web-${{ github.event.release.tag_name }}.zip"

      - name: Upload workflow artifacts
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: androminer-${{ github.event.release.tag_name }}-android
          path: release-assets/*
          if-no-files-found: error

      - name: Attach assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" release-assets/* --clobber

      - name: Add SHA256 checksums to GitHub Release notes
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          checksums_file="$RUNNER_TEMP/release-sha256.md"
          current_body_file="$RUNNER_TEMP/release-body.md"
          next_body_file="$RUNNER_TEMP/release-body-with-sha256.md"

          {
            echo "## SHA256 checksums"
            echo
            echo "| File | SHA256 |"
            echo "| --- | --- |"
            find release-assets -maxdepth 1 -type f -print | sort | while read -r asset; do
              checksum="$(sha256sum "$asset" | awk '{print $1}')"
              file_name="$(basename "$asset")"
              echo "| \`$file_name\` | \`$checksum\` |"
            done
          } > "$checksums_file"

          gh release view "$RELEASE_TAG" --json body -q '.body // ""' > "$current_body_file"
          awk '
            /^## SHA256 checksums$/ { skip = 1; next }
            skip && /^## / { skip = 0 }
            !skip { print }
          ' "$current_body_file" > "$next_body_file"
          perl -0pi -e 's/\s+\z//' "$next_body_file"

          if [ -s "$next_body_file" ]; then
            printf "\n\n" >> "$next_body_file"
          fi

          cat "$checksums_file" >> "$next_body_file"
          gh release edit "$RELEASE_TAG" --notes-file "$next_body_file"
