name: Android Miner Binary

on:
  push:
    branches: [main]
    paths:
      - miner-builder/**
      - .github/workflows/binary-build.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build and publish ARM64 miner binaries
    runs-on: ubuntu-latest

    steps:
      - name: Check out main branch
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake make ninja-build perl

      - name: Install Android NDK
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" "ndk;27.2.12479018"

      - name: Build TLS miner
        env:
          XMRIG_REF: v6.26.0
          LIBUV_REF: v1.48.0
          OPENSSL_REF: openssl-3.3.2
          WITH_TLS: ON
          QUIET: ON
        run: ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018" bash miner-builder/build-xmrig-android.sh

      - name: Collect TLS miner
        run: |
          mkdir -p miner-payload/lib/arm64-v8a/tls
          cp android/app/src/main/jniLibs/arm64-v8a/libxmrig.so miner-payload/lib/arm64-v8a/tls/libxmrig.so

      - name: Build no-TLS miner
        env:
          XMRIG_REF: v6.26.0
          LIBUV_REF: v1.48.0
          OPENSSL_REF: openssl-3.3.2
          WITH_TLS: OFF
          QUIET: ON
        run: ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018" bash miner-builder/build-xmrig-android.sh

      - name: Collect no-TLS miner
        run: |
          mkdir -p miner-payload/lib/arm64-v8a/notls
          cp android/app/src/main/jniLibs/arm64-v8a/libxmrig.so miner-payload/lib/arm64-v8a/notls/libxmrig.so

      - name: Prepare branch payload
        run: |
          cp miner-payload/lib/arm64-v8a/tls/libxmrig.so miner-payload/lib/arm64-v8a/libxmrig.so
          (cd miner-payload && sha256sum lib/arm64-v8a/libxmrig.so lib/arm64-v8a/tls/libxmrig.so lib/arm64-v8a/notls/libxmrig.so > SHA256SUMS)
          cat > miner-payload/README.md <<'EOF'
          # AndroMiner Miner Binaries

          This branch is generated by the Android Miner Binary workflow on `main`.

          The app can download either binary:

          ```text
          lib/arm64-v8a/tls/libxmrig.so
          lib/arm64-v8a/notls/libxmrig.so
          ```

          `lib/arm64-v8a/libxmrig.so` is kept as the TLS default for compatibility.

          Source and build scripts live in the `miner-builder/` directory on the `main` branch.
          EOF

      - name: Upload miner artifact
        uses: actions/upload-artifact@v4
        with:
          name: androminer-arm64-miners
          path: miner-payload/**
          if-no-files-found: error

      - name: Publish miner-builder branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd miner-payload
          git init
          git checkout -b miner-builder
          git add .
          git commit -m "Publish Android miner binary"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin miner-builder
